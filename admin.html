<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IA Rural — Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  background: #000;
  color: #fff;
  font-family: Arial;
  padding: 20px;
}

input, select {
  background: #fff;
  color: #000;
  padding: 10px;
  margin: 5px 0;
  width: 100%;
}

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.card {
  border: 1px solid #333;
  padding: 15px;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<h2>IA Rural Admin</h2>

<div class="card">
  <h3>Criar usuário</h3>
  <input id="nome" placeholder="Nome">
  <input id="usuario" placeholder="Usuário">
  <input id="senha" placeholder="Senha">
  <button onclick="criar()">Criar usuário</button>
  <p id="msg"></p>
</div>

<div class="card">
  <h3>Usuários</h3>
  <div id="lista"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDs6njrUFchymlhcFHwdGSv6nPrKXoiLEc",
  authDomain: "ia-rural.firebaseapp.com",
  projectId: "ia-rural",
  storageBucket: "ia-rural.firebasestorage.app",
  messagingSenderId: "889787646020",
  appId: "1:889787646020:web:d4e1ef26bcf9ca3b1dbc11"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 LOGIN AUTOMÁTICO (RESOLVE SEU ERRO)
auth.signInAnonymously().catch(console.error);

function email(u){
  return u + "@ia-rural.app";
}

async function criar(){
  const nome = document.getElementById('nome').value;
  const usuario = document.getElementById('usuario').value;
  const senha = document.getElementById('senha').value;

  try {
    const res = await fetch(
      "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=" + firebaseConfig.apiKey,
      {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          email: email(usuario),
          password: senha,
          returnSecureToken: true
        })
      }
    );

    const data = await res.json();

    if (!res.ok) throw data;

    await db.collection("admin_users").doc(usuario).set({
      nome,
      usuario,
      uid: data.localId,
      criado: new Date()
    });

    document.getElementById("msg").innerText = "Usuário criado!";
    carregar();

  } catch(e){
    console.log(e);
    document.getElementById("msg").innerText = "Erro ao criar usuário";
  }
}

async function carregar(){
  const snap = await db.collection("admin_users").get();
  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  snap.forEach(doc=>{
    const u = doc.data();
    lista.innerHTML += `
      <div>
        ${u.usuario} - ${u.nome}
      </div>
    `;
  });
}

carregar();
</script>

</body>
</html>
