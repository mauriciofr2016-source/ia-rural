<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Rural - Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 430px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 0 20px rgba(255,255,255,0.04);
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .sub {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #ddd;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #000;
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    input:focus {
      border-color: #fff;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 18px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #000;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .secondary {
      background: #222;
      color: #fff;
      border: 1px solid #444;
    }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .ok {
      color: #46e36b;
    }

    .erro {
      color: #ff6b6b;
    }

    .hidden {
      display: none;
    }

    .user-info {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="loginScreen">
      <h1>IA Rural Admin</h1>
      <p class="sub">Entre com seu email e senha de administrador</p>

      <label for="adminEmail">Email</label>
      <input type="email" id="adminEmail" placeholder="Seu email de admin" />

      <label for="adminSenha">Senha</label>
      <input type="password" id="adminSenha" placeholder="Sua senha" />

      <button id="btnLogin">Entrar</button>

      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="adminScreen" class="hidden">
      <h2>Painel do Administrador</h2>
      <div id="adminInfo" class="user-info"></div>

      <label for="fazenda">Nome da fazenda</label>
      <input type="text" id="fazenda" placeholder="Ex: Fazenda Boa Vista" />

      <label for="loginUsuario">Usuário</label>
      <input type="text" id="loginUsuario" placeholder="Ex: teste" />

      <label for="senhaUsuario">Senha</label>
      <input type="password" id="senhaUsuario" placeholder="Mínimo 6 caracteres" />

      <button id="btnCriarUsuario">Criar usuário</button>
      <button id="btnSair" class="secondary">Sair</button>

      <div id="adminMsg" class="msg"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      createUserWithEmailAndPassword,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // SUBSTITUA SOMENTE ESTE BLOCO PELA MESMA CONFIG QUE JA FUNCIONA NO SEU INDEX.HTML
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO",
      storageBucket: "SEU_PROJETO.firebasestorage.app",
      messagingSenderId: "SEU_MESSAGING_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const secondaryApp =
      getApps().find(app => app.name === "admin-secondary") ||
      initializeApp(firebaseConfig, "admin-secondary");

    const secondaryAuth = getAuth(secondaryApp);

    const loginScreen = document.getElementById("loginScreen");
    const adminScreen = document.getElementById("adminScreen");

    const adminEmail = document.getElementById("adminEmail");
    const adminSenha = document.getElementById("adminSenha");
    const btnLogin = document.getElementById("btnLogin");
    const btnSair = document.getElementById("btnSair");

    const fazenda = document.getElementById("fazenda");
    const loginUsuario = document.getElementById("loginUsuario");
    const senhaUsuario = document.getElementById("senhaUsuario");
    const btnCriarUsuario = document.getElementById("btnCriarUsuario");

    const loginMsg = document.getElementById("loginMsg");
    const adminMsg = document.getElementById("adminMsg");
    const adminInfo = document.getElementById("adminInfo");

    function mostrarMsg(el, texto, tipo = "") {
      el.textContent = texto;
      el.className = "msg " + tipo;
    }

    function abrirPainel(user) {
      loginScreen.classList.add("hidden");
      adminScreen.classList.remove("hidden");
      adminInfo.textContent = "Logado como: " + (user.email || "admin");
    }

    function abrirLogin() {
      adminScreen.classList.add("hidden");
      loginScreen.classList.remove("hidden");
      adminInfo.textContent = "";
    }

    btnLogin.addEventListener("click", async () => {
      const email = adminEmail.value.trim();
      const senha = adminSenha.value.trim();

      mostrarMsg(loginMsg, "");

      try {
        if (!email || !senha) {
          throw new Error("Preencha email e senha.");
        }

        await setPersistence(auth, browserLocalPersistence);
        const cred = await signInWithEmailAndPassword(auth, email, senha);

        mostrarMsg(loginMsg, "Login realizado com sucesso.", "ok");
        abrirPainel(cred.user);
      } catch (error) {
        console.error(error);
        mostrarMsg(loginMsg, "Email ou senha inválidos.", "erro");
      }
    });

    btnCriarUsuario.addEventListener("click", async () => {
      const nomeFazenda = fazenda.value.trim();
      const usuario = loginUsuario.value.trim().toLowerCase();
      const senha = senhaUsuario.value.trim();

      mostrarMsg(adminMsg, "");

      try {
        if (!auth.currentUser) {
          throw new Error("Admin não está logado.");
        }

        if (!nomeFazenda || !usuario || !senha) {
          throw new Error("Preencha todos os campos.");
        }

        if (senha.length < 6) {
          throw new Error("A senha deve ter no mínimo 6 caracteres.");
        }

        const emailGerado = `${usuario}@iarural.local`;

        const cred = await createUserWithEmailAndPassword(
          secondaryAuth,
          emailGerado,
          senha
        );

        await setDoc(doc(db, "usuarios", cred.user.uid), {
          uid: cred.user.uid,
          fazenda: nomeFazenda,
          login: usuario,
          email: emailGerado,
          senha: senha,
          tipo: "usuario",
          criadoEm: serverTimestamp(),
          criadoPor: auth.currentUser.uid
        });

        mostrarMsg(adminMsg, "Usuário criado com sucesso.", "ok");

        fazenda.value = "";
        loginUsuario.value = "";
        senhaUsuario.value = "";
      } catch (error) {
        console.error("Erro ao criar usuário:", error);

        if (error.code === "auth/email-already-in-use") {
          mostrarMsg(adminMsg, "Esse usuário já existe.", "erro");
        } else if (error.code === "auth/weak-password") {
          mostrarMsg(adminMsg, "Senha fraca. Use pelo menos 6 caracteres.", "erro");
        } else if (error.code === "auth/invalid-email") {
          mostrarMsg(adminMsg, "Usuário inválido.", "erro");
        } else {
          mostrarMsg(adminMsg, error.message || "Erro ao criar usuário.", "erro");
        }
      }
    });

    btnSair.addEventListener("click", async () => {
      try {
        await signOut(auth);
        mostrarMsg(adminMsg, "");
        abrirLogin();
      } catch (error) {
        console.error(error);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        abrirPainel(user);
      } else {
        abrirLogin();
      }
    });
  </script>
</body>
</html>
