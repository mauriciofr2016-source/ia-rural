<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin IA Rural</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body { background:#000; color:#fff; font-family:Arial; padding:20px }
input, select { padding:10px; margin:5px; width:200px }
button { padding:10px; background:#fff; border:none; cursor:pointer }
.user-row { margin-top:10px; padding:10px; border:1px solid #444 }
</style>
</head>

<body>

<div id="admin-login">
  <h2>Login Admin</h2>
  <input id="adm-user" placeholder="Usuário"><br>
  <input id="adm-pass" type="password" placeholder="Senha"><br>
  <button onclick="loginAdmin()">Entrar</button>
  <div id="adm-erro" style="color:red;display:none">Erro no login</div>
</div>

<div id="admin-painel" style="display:none">
  <h2>Painel Admin</h2>

  <h3>Criar Usuário</h3>
  <input id="n-nome" placeholder="Nome"><br>
  <input id="n-usuario" placeholder="Usuário"><br>
  <input id="n-senha" placeholder="Senha"><br>
  <select id="n-status">
    <option value="ativo">Ativo</option>
    <option value="inativo">Inativo</option>
  </select><br>
  <button onclick="criarUsuario()">Criar</button>

  <h3>Usuários</h3>
  <div id="lista-usuarios"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDs6njrUFchymlhcFHwdGSv6nPrKXoiLEc",
  authDomain: "ia-rural.firebaseapp.com",
  projectId: "ia-rural",
  storageBucket: "ia-rural.firebasestorage.app",
  messagingSenderId: "889787646020",
  appId: "1:889787646020:web:d4e1ef26bcf9ca3b1dbc11"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function normalizarUsuario(u){
  return (u||"").toLowerCase().replace(/\s+/g,'');
}

function usuarioParaEmail(u){
  return u+"@ia-rural.app";
}

async function loginAdmin() {
  const user = document.getElementById('adm-user').value.trim();
  const pass = document.getElementById('adm-pass').value;

  try {
    await auth.signInWithEmailAndPassword(
      user.includes('@') ? user : user+"@ia-rural.app",
      pass
    );

    document.getElementById('admin-login').style.display='none';
    document.getElementById('admin-painel').style.display='block';

    carregarUsuarios();

  } catch(e){
    document.getElementById('adm-erro').style.display='block';
  }
}

async function criarUsuario() {
  const nome = document.getElementById('n-nome').value.trim();
  const usuario = normalizarUsuario(document.getElementById('n-usuario').value);
  const senha = document.getElementById('n-senha').value.trim();
  const status = document.getElementById('n-status').value;

  if(!nome || !usuario || !senha){
    alert("Preencha tudo");
    return;
  }

  try{
    const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${firebaseConfig.apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email: usuarioParaEmail(usuario),
        password: senha,
        returnSecureToken:true
      })
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.error.message);
      return;
    }

    await db.collection("admin_usuarios").doc(data.localId).set({
      nome,
      usuario,
      senha,
      status,
      criadoEm:new Date()
    });

    alert("Usuário criado!");
    carregarUsuarios();

  }catch(e){
    alert("Erro: "+e.message);
  }
}

async function carregarUsuarios(){
  const el = document.getElementById('lista-usuarios');
  const snap = await db.collection("admin_usuarios").get();

  el.innerHTML="";

  snap.forEach(doc=>{
    const u = doc.data();

    el.innerHTML += `
      <div class="user-row">
        <strong>${u.nome}</strong><br>
        ${u.usuario} | ${u.status}
      </div>
    `;
  });
}
</script>

</body>
</html>
