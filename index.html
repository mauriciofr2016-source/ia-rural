<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IA RURAL</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; background: #f4f4f4; margin: 0; }
.topo { background: #1e3a2f; color: white; padding: 10px; }
.aba { cursor: pointer; margin-right: 10px; display: inline-block; }
.secao { display: none; padding: 15px; }
.ativa { display: block; }
button { padding: 6px 10px; margin-top: 5px; }
input, select { display: block; margin: 5px 0; padding: 5px; }
.card { background: white; padding: 10px; margin: 10px 0; border-radius: 6px; }
</style>
</head>

<body>

<div class="topo">
  <span class="aba" onclick="abrirAba('rebanho')">Meu Rebanho</span>
  <span class="aba" onclick="abrirAba('cadastrar')">Cadastrar Animal</span>
  <span class="aba" onclick="abrirAba('protocolar')">Protocolar Vaca</span>
  <span class="aba" onclick="abrirAba('protocolados')">Vacas Protocoladas</span>
</div>

<div id="rebanho" class="secao ativa"></div>

<div id="cadastrar" class="secao">
  <input id="nome" placeholder="Nome">
  <input id="nascimento" type="date">
  <select id="sexo">
    <option value="femea">Fêmea</option>
    <option value="macho">Macho</option>
  </select>
  <button onclick="salvarAnimal()">Cadastrar</button>
</div>

<div id="protocolar" class="secao">
  <input id="nomeProtocolo" placeholder="Nome ou Brinco">
  <input id="dataProtocolo" type="date">
  <input id="boi" placeholder="Nome do boi">
  <input id="toque" type="date">
  <button onclick="salvarProtocolo()">Salvar Protocolo</button>
</div>

<div id="protocolados" class="secao"></div>

<script>
const firebaseConfig = {
   apiKey: "AIzaSyDs6njrUFchymlhcFHwdGSv6nPrKXoiLEc",
      authDomain: "ia-rural.firebaseapp.com",
      projectId: "ia-rural",
      storageBucket: "ia-rural.firebasestorage.app",
      messagingSenderId: "889787646020",
      appId: "1:889787646020:web:d4e1ef26bcf9ca3b1dbc11"
    };

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let uid = null;

auth.onAuthStateChanged(user => {
  if (user) {
    uid = user.uid;
    carregarAnimais();
    carregarProtocolos();
  }
});

function abrirAba(id) {
  document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}

function calcularCategoria(nascimento, sexo) {
  const hoje = new Date();
  const nasc = new Date(nascimento);

  let meses =
    (hoje.getFullYear() - nasc.getFullYear()) * 12 +
    (hoje.getMonth() - nasc.getMonth());

  if (sexo === "femea") {
    if (meses < 12) return "Bezerra";
    if (meses < 24) return "Novilha";
    return "Vaca";
  } else {
    if (meses < 12) return "Bezerro";
    if (meses < 24) return "Garrote";
    return "Boi";
  }
}

async function salvarAnimal() {
  const nome = document.getElementById("nome").value;
  const nascimento = document.getElementById("nascimento").value;
  const sexo = document.getElementById("sexo").value;

  if (!nome || !nascimento) return alert("Preencha tudo");

  const categoria = calcularCategoria(nascimento, sexo);

  await db.collection("users")
    .doc(uid)
    .collection("animais")
    .add({
      nome,
      nascimento,
      sexo,
      categoria,
      criado: new Date()
    });

  alert("Salvo com sucesso");

  document.getElementById("nome").value = "";
  carregarAnimais();
}

async function carregarAnimais() {
  const lista = document.getElementById("rebanho");
  lista.innerHTML = "";

  const snap = await db.collection("users")
    .doc(uid)
    .collection("animais")
    .orderBy("criado", "desc")
    .get();

  snap.forEach(doc => {
    const d = doc.data();

    lista.innerHTML += `
      <div class="card">
        <b>${d.nome}</b><br>
        ${d.categoria}
      </div>
    `;
  });
}

async function salvarProtocolo() {
  const nome = document.getElementById("nomeProtocolo").value;
  const data = document.getElementById("dataProtocolo").value;
  const boi = document.getElementById("boi").value;
  const toque = document.getElementById("toque").value;

  await db.collection("users")
    .doc(uid)
    .collection("protocolos")
    .add({
      nome,
      data,
      boi,
      toque,
      criado: new Date()
    });

  alert("Protocolo salvo");

  carregarProtocolos();
}

async function carregarProtocolos() {
  const lista = document.getElementById("protocolados");
  lista.innerHTML = "";

  const snap = await db.collection("users")
    .doc(uid)
    .collection("protocolos")
    .orderBy("criado", "desc")
    .get();

  snap.forEach(doc => {
    const d = doc.data();

    lista.innerHTML += `
      <div class="card">
        <b>${d.nome}</b><br>
        ${d.data}<br>
        <button onclick="excluirProtocolo('${doc.id}')">Excluir</button>
      </div>
    `;
  });
}

async function excluirProtocolo(id) {
  await db.collection("users")
    .doc(uid)
    .collection("protocolos")
    .doc(id)
    .delete();

  carregarProtocolos();
}
</script>

</body>
</html>
