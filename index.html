<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IA Rural</title>
</head>

<body>

<!-- SEU HTML ORIGINAL CONTINUA AQUI (NÃO ALTERADO) -->

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDs6njrUFchymlhcFHwdGSv6nPrKXoiLEc",
  authDomain: "ia-rural.firebaseapp.com",
  projectId: "ia-rural",
  storageBucket: "ia-rural.firebasestorage.app",
  messagingSenderId: "889787646020",
  appId: "1:889787646020:web:d4e1ef26bcf9ca3b1dbc11"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let usuarioFirebase = null;

// ================= DB ORIGINAL =================
let DB = {
  animais: [],
  arquivados: [],
  producao: {},
  entregas: [],
  estoqueRacao: 0,
  ultimoBackup: null
};

// ================= LOGIN (NÃO MEXIDO) =================
onAuthStateChanged(auth, async (user) => {
  if (user) {
    usuarioFirebase = user;
    await carregarFirestore();
  }
});

// ================= SALVAR =================
async function salvarDB() {
  localStorage.setItem('ia_rural_db', JSON.stringify(DB));

  if (!usuarioFirebase) return;

  try {
    await setDoc(
      doc(db, "users", usuarioFirebase.uid),
      DB
    );
  } catch (e) {
    console.log("Erro Firebase:", e);
  }
}

// ================= CARREGAR =================
async function carregarFirestore() {
  try {
    const ref = doc(db, "users", usuarioFirebase.uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      DB = snap.data();
      localStorage.setItem('ia_rural_db', JSON.stringify(DB));
      showPage('inicio');
    }
  } catch (e) {
    console.log("Erro ao carregar:", e);
  }
}

// ================= CARREGAR LOCAL =================
function carregarDB() {
  const raw = localStorage.getItem('ia_rural_db');
  if (raw) {
    try { DB = JSON.parse(raw); } catch(e) {}
  }
}

// ================= VETERINÁRIO CORRIGIDO =================
let chatHistory = [];
let vetLoading = false;

function gerarRespostaLocal(pergunta) {
  pergunta = pergunta.toLowerCase();

  if (pergunta.includes("não come")) {
    return "Pode ser problema digestivo ou febre. Observe se está bebendo água.";
  }

  if (pergunta.includes("febre")) {
    return "Acima de 39.5°C é preocupante. Observe outros sintomas.";
  }

  if (pergunta.includes("leite caiu")) {
    return "Pode ser mastite ou alimentação inadequada.";
  }

  if (pergunta.includes("diarreia")) {
    return "Pode ser infecção ou alimentação. Hidrate o animal.";
  }

  return "Descreva melhor: o animal está comendo? tem febre?";
}

async function enviarVet() {
  if (vetLoading) return;

  const input = document.getElementById('vet-input');
  const texto = input.value.trim();
  if (!texto) return;

  input.value = '';

  const msgsEl = document.getElementById('vet-msgs');

  msgsEl.innerHTML += `<div class="chat-bubble bubble-user">${texto}</div>`;

  vetLoading = true;

  const resposta = gerarRespostaLocal(texto);

  msgsEl.innerHTML += `<div class="chat-bubble bubble-ai">${resposta}</div>`;

  vetLoading = false;
  msgsEl.scrollTop = msgsEl.scrollHeight;

  // salva histórico
  if (usuarioFirebase) {
    await setDoc(doc(db, "users", usuarioFirebase.uid, "vet", Date.now().toString()), {
      pergunta: texto,
      resposta: resposta,
      data: new Date().toISOString()
    });
  }
}

// ================= RESTO DO APP (IGUAL) =================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');

  const pages = ['inicio','rebanho','producao','despesas','veterinario','calendario','arquivados'];
  const idx = pages.indexOf(id);
  if (idx >= 0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');

  if (id === 'rebanho') renderRebanho();
  if (id === 'producao') renderProducao();
  if (id === 'despesas') renderDespesas();
  if (id === 'calendario') renderCalendario();
  if (id === 'arquivados') renderArquivados();
}

// mantém tudo funcionando
carregarDB();

</script>

</body>
</html>
