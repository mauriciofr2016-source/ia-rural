<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IA Rural</title>

<!-- FIREBASE COMPAT (NÃO QUEBRA NADA) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- ===== SEU APP CONTINUA IGUAL ===== -->
<div id="app">Carregando IA Rural...</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDs6njrUFchymlhcFHwdGSv6nPrKXoiLEc",
  authDomain: "ia-rural.firebaseapp.com",
  projectId: "ia-rural",
  storageBucket: "ia-rural.firebasestorage.app",
  messagingSenderId: "889787646020",
  appId: "1:889787646020:web:d4e1ef26bcf9ca3b1dbc11"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

let usuarioFirebase = null;

// ================= BANCO LOCAL =================
let DB = {
  animais: [],
  arquivados: [],
  producao: {},
  entregas: [],
  estoqueRacao: 0,
  ultimoBackup: null
};

// ================= LOGIN =================
auth.onAuthStateChanged(async (user) => {
  if (user) {
    usuarioFirebase = user;
    await carregarFirestore();
  }
});

// ================= SALVAR =================
async function salvarDB() {
  localStorage.setItem('ia_rural_db', JSON.stringify(DB));

  if (!usuarioFirebase) return;

  try {
    await db.collection("users")
      .doc(usuarioFirebase.uid)
      .set(DB);
  } catch (e) {
    console.log("Erro Firebase:", e);
  }
}

// ================= CARREGAR =================
async function carregarFirestore() {
  try {
    const docRef = await db.collection("users")
      .doc(usuarioFirebase.uid)
      .get();

    if (docRef.exists) {
      DB = docRef.data();
      localStorage.setItem('ia_rural_db', JSON.stringify(DB));
    }
  } catch (e) {
    console.log("Erro ao carregar:", e);
  }
}

// ================= LOCAL =================
function carregarDB() {
  const raw = localStorage.getItem('ia_rural_db');
  if (raw) {
    try { DB = JSON.parse(raw); } catch(e) {}
  }
}

// ================= VETERINÁRIO =================
let vetLoading = false;

function gerarRespostaLocal(pergunta) {
  pergunta = pergunta.toLowerCase();

  if (pergunta.includes("não come")) {
    return "Pode ser problema digestivo ou febre. Observe se está bebendo água.";
  }

  if (pergunta.includes("febre")) {
    return "Temperatura acima de 39.5°C é sinal de alerta.";
  }

  if (pergunta.includes("leite caiu")) {
    return "Pode ser mastite ou problema alimentar.";
  }

  if (pergunta.includes("diarreia")) {
    return "Pode ser infecção ou alimentação inadequada.";
  }

  return "Descreva melhor os sintomas do animal.";
}

async function enviarVet() {
  if (vetLoading) return;

  const input = document.getElementById('vet-input');
  if (!input) return;

  const texto = input.value.trim();
  if (!texto) return;

  input.value = '';

  const msgsEl = document.getElementById('vet-msgs');
  if (!msgsEl) return;

  msgsEl.innerHTML += `<div>${texto}</div>`;

  vetLoading = true;

  const resposta = gerarRespostaLocal(texto);

  msgsEl.innerHTML += `<div>${resposta}</div>`;

  vetLoading = false;
}

// ================= INICIAR =================
carregarDB();

</script>

</body>
</html>
